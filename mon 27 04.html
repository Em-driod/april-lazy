<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Counter</title>
</head>

<body style="background-color: black; display: flex; justify-content: center; align-items: center; height: 100vh;">

<section style="background-color: rgb(34,32,32); padding: 30px; width: 250px; text-align: center; border-radius: 10px;">

    <div style="color: grey; margin-bottom: 20px;">
        Smart Counter
    </div>

    <!-- DISPLAY -->
    <h1 id="display" style="color:white; transition: 0.3s;">0</h1>

    <!-- Buttons -->
    <div style="display: flex; justify-content: space-between;">
        <button onclick="increase()" id="increment" style="background: green; color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 25px;">+</button>
 <button onclick="increment2()" id="increment2" style="background: green; color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 25px;">+2</button>
        <button onclick="reset()" id="reset" style="background: blue; color: white; border-radius: 50%; width: 50px; height: 50px;">CL</button>

        <button onclick="decrease()" id="decrement" style="background: red; color: white; border-radius: 50%; width: 50px; height: 50px; font-size: 25px;">-</button>
    </div>

</section>

<script>

let count = 0;
const max = 500;

const display = document.getElementById('display');

// +1
function increase() {
    if (count < max) {
        count++;
        display.textContent = count;
    }
}

// -1
function decrease() {
    if (count > 0) {
        count--;
        display.textContent = count;
    }
}

// reset
function reset() {
    count = 0;
    display.textContent = count;
}

// +2
function increment2() {
    if (count + 2 <= max) {
        count += 2;
        display.textContent = count;
    }
}
</script>
    
</body>
</html>
