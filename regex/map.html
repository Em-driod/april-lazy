<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Map Cards</title>
</head>

<body class="bg-gray-100 p-10">

    <h1 class="text-2xl font-bold mb-6">Product Cards</h1>

    <!-- Container -->
    <div id="cardContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">


    </div>

    <script>
        //  Data  (your array)
        let products = [
            { name: "iPhone 15", price: "$999", color: "Black" },
            { name: "MacBook Pro", price: "$1999", color: "Silver" },
            { name: "AirPods Pro", price: "$249", color: "White" }
        ];


        //  RENDER FUNCTION
        function renderCards() {
            const container = document.getElementById("cardContainer");

            container.innertext = products

            container.innerHTML = products.map(product => {
                return `
          <div class="bg-white rounded-2xl shadow-lg p-5 hover:scale-105 transition duration-300">

            <h2 class="text-xl font-bold mb-2">${product.name}</h2>

            <p class="text-gray-600">Color: ${product.color}</p>

            <p class="text-green-600 font-semibold mt-2">${product.price}</p>

            <button class="mt-4 w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800">
              Buy Now
            </button>

          </div>
        `;
            }).join("");
        }

        //  RUN ON LOAD
        renderCards();
    </script>

</body>

</html>
