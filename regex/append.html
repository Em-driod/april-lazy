<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Simple Append Project</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px;
            background-color: #f4f4f9;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #task-list {
            margin-top: 20px;
            padding: 0;
        }

        .item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            list-style: none;
            color: #333;
            animation: fadeIn 0.3s ease;
        }

        /* A little animation for the new items */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        input {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            padding: 8px 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>My Task List</h2>
        <input type="text" id="userInput" placeholder="What needs to be done?">
        <button onclick="addItem()">Add</button>

        <ul id="task-list">


        </ul>
    </div>

    <script>
        // Function to add the item
        function addItem() {
            const input = document.getElementById('userInput');
            const list = document.getElementById('task-list');



            input.value
            // 1. Validation: Don't add if the input is empty
            if (input.value.trim() === "") {
                alert("Please type something first!");
                return;
            }

            // 2. CREATE: The new list item
            const newItem = document.createElement('li');

            // 3. CONFIGURE: Set the text and class
            newItem.innerText = input.value;
            newItem.className = 'item';

            // 4. ATTACH: The "Append Child" magic
            list.appendChild(newItem);

            // 5. CLEANUP: Clear the box for the next entry
            input.value = "";
            input.focus();
        }

        // EXTRA: Allow pressing "Enter" to add the item
        document.getElementById('userInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                addItem();
            }
        });
    </script>
</body>

</html>
