<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>Callback Function</title>
</head>

<body class="bg-gray-100 h-screen flex justify-center items-center">

    <div class="bg-white p-10 rounded-2xl shadow-xl text-center">

        <h1 class="text-2xl font-bold mb-5">
            Callback Demo
        </h1>

        <button id="btn" class="bg-black text-white px-6 py-3 rounded-lg">
            Start Process
        </button>

        <p id="message" class="mt-5 text-lg font-semibold text-green-600">

        </p>

    </div>

    <script>

        const btn = document.getElementById("btn");
        const message = document.getElementById("message");

        // MAIN FUNCTION
        function startApplication(callback) {

            message.textContent = "Loading...";



            setTimeout(() => {

                callback();

            }, 7000);

        }

        // SECOND FUNCTION
        function showSuccess() {

            message.textContent = "Application Started Successfully";

        }

        // BUTTON CLICK
        btn.addEventListener("click", () => {

            startApplication(showSuccess);

        });




    </script>

</body>

</html>
