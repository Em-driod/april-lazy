<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Counter</title>
</head>

<body>

    <h1 id="count">0</h1>
    <button id="btn">Increase</button>

    <script>
        let count = 0;

        const button = document.getElementById("btn");
        const display = document.getElementById("count");

        function increment() {
            count++;
            display.textContent = count;
        }

        button.addEventListener("click", increment);

    </script>

</body>

</html>
